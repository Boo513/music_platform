server:
  port: 8080

spring:
  datasource:
    url: jdbc:mysql://localhost:3306/music_platform?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.musicplatform.entity
  configuration:
    map-underscore-to-camel-case: true

app:
  jwt:
    secret: YourSuperSecretKeyForJWT512BitsMinLengthChangeThisInProduction!!!
    expiration-days: 7
  upload:
    audio-dir: uploads/audio
    cover-dir: uploads/covers
